<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-4xl mx-auto bg-white p-6 rounded shadow">
        <h1 class="text-2xl font-bold mb-4">Portofolio</h1>
        <a href="/create" class="bg-blue-500 text-white px-4 py-2 rounded">Tambah</a>
        <div class="mt-4">
            {{ range .portofolios }}
            <div class="border p-4 mt-2">
                <h2 class="text-xl font-semibold">{{ .Title }}</h2>
                <p>{{ .Description }}</p>
                <img src="{{ .Image }}" alt="image" class="w-48 h-32 mt-2 object-cover">
                <form action="/delete/{{ .ID }}" method="POST">
                    <button class="mt-2 bg-red-500 text-white px-2 py-1 rounded">Hapus</button>
                </form>
            </div>
            {{ end }}
        </div>
    </div>
</body>
</html>
