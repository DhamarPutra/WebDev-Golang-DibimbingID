<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Portofolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-md mx-auto bg-white p-6 rounded shadow">
        <h1 class="text-2xl font-bold mb-4">Tambah Portofolio</h1>
        <form action="/create" method="POST">
            <label class="block">Judul:</label>
            <input type="text" name="title" class="border p-2 w-full rounded">
            
            <label class="block mt-2">Deskripsi:</label>
            <textarea name="description" class="border p-2 w-full rounded"></textarea>

            <label class="block mt-2">Gambar (URL):</label>
            <input type="text" name="image" class="border p-2 w-full rounded">

            <button class="mt-4 bg-blue-500 text-white px-4 py-2 rounded">Tambah</button>
        </form>
        <a href="/" class="mt-4 inline-block text-blue-500">Kembali</a>
    </div>
</body>
</html>
